name: EdgeWatch BSP Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "BSP version (e.g. 1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bsp-release:
    name: Build & Publish EdgeWatch BSP
    runs-on: [self-hosted, buildroot]

    steps:
      # -------------------------------------------------
      # Checkout repository (with Buildroot submodule)
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # -------------------------------------------------
      # Authenticate GitHub CLI (required for gh release)
      # -------------------------------------------------
      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      # -------------------------------------------------
      # Build + Tag + Release (Makefile handles everything)
      # -------------------------------------------------
      - name: Publish BSP (config + kernel + toolchain)
        run: |
          set -o pipefail

          make publish \
            VERSION=${{ inputs.version }} \
            > build.log 2> >(tee build.err >&2)

      # -------------------------------------------------
      # Upload logs (always)
      # -------------------------------------------------
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bsp-build-logs-${{ inputs.version }}
          path: |
            build.log
            build.err
